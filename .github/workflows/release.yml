name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      should_release: ${{ steps.meta.outputs.should_release }}
      needs_npm_publish: ${{ steps.meta.outputs.needs_npm_publish }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          TAG="v$VERSION"

          # Create a GitHub release if the version tag doesn't exist yet. The
          # tag check is the sole guard — no need to also require package.json
          # in the diff, which breaks when the version bump and changelog land
          # in separate commits.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            SHOULD_RELEASE=false
          else
            SHOULD_RELEASE=true
          fi

          # Publish to npm if this version is not on the registry yet. Checked
          # independently of the tag so a re-run (workflow_dispatch) can publish
          # a version whose tag/release already exists — e.g. after configuring
          # trusted publishing.
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            NEEDS_NPM_PUBLISH=false
          else
            NEEDS_NPM_PUBLISH=true
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "needs_npm_publish=$NEEDS_NPM_PUBLISH" >> "$GITHUB_OUTPUT"

      - name: Verify CHANGELOG entry exists
        if: >-
          steps.meta.outputs.should_release == 'true' ||
          steps.meta.outputs.needs_npm_publish == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "Missing CHANGELOG entry for version $VERSION"
            echo "Expected a line like: ## [$VERSION] — YYYY-MM-DD"
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        if: steps.meta.outputs.needs_npm_publish == 'true'
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify all files listed in package.json are in the tarball
        if: steps.meta.outputs.needs_npm_publish == 'true'
        shell: bash
        run: |
          npm pack
          TARBALL=$(ls *.tgz)
          TMPDIR=$(mktemp -d)
          tar -xzf "$TARBALL" -C "$TMPDIR"

          # Verify the pi.extensions and package files entries exist
          export GS_PKG_DIR="$TMPDIR/package"
          node -e "
            const path = require('path');
            const fs = require('fs');
            const pkgDir = process.env.GS_PKG_DIR;
            const pkg = require(path.join(pkgDir, 'package.json'));
            const pi = pkg.pi || {};
            const entries = []
              .concat(pi.extensions || [])
              .concat(pkg.files || []);
            for (const entry of entries) {
              // directories end with / — just check the first file inside
              const full = path.join(pkgDir, entry);
              if (entry.endsWith('/')) {
                if (!fs.existsSync(full) || !fs.readdirSync(full).length) {
                  console.error('ERROR: missing/empty tarball dir: ' + entry);
                  process.exit(1);
                }
                console.log('OK: dir -> ' + entry);
              } else {
                if (!fs.existsSync(full)) {
                  console.error('ERROR: missing tarball entry: ' + entry);
                  process.exit(1);
                }
                console.log('OK: file -> ' + entry);
              }
            }
          "
          rm -rf "$TMPDIR"

      - name: Dry-run publish (validates tarball)
        if: steps.meta.outputs.needs_npm_publish == 'true'
        run: npm publish --dry-run

  release:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      # The release body is the curated CHANGELOG section for this version, not
      # the auto-generated PR-title list — so the release reads as a meaningful
      # summary. `prepare` already verified the `## [VERSION]` heading exists.
      - name: Extract CHANGELOG release notes
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: >
          node scripts/changelog-extract.mjs "$VERSION" --summary
          -o "$RUNNER_TEMP/release-notes.md"

      # `gh release create` also creates the tag from the current commit, so no
      # separate git push is needed (works with persist-credentials: false).
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: >
          gh release create "$TAG" --title "$TAG"
          --notes-file "$RUNNER_TEMP/release-notes.md"

  # Publishes via npm trusted publishing (OIDC) — no NPM_TOKEN secret. The
  # trusted publisher must be configured on npmjs.com for
  # @apmantza/greedysearch-pi, pointing at this repo and this workflow file.
  # npm >= 11.5.1 (bundled with Node 24) detects the GitHub Actions OIDC token
  # automatically during `npm publish`.
  publish-npm:
    runs-on: ubuntu-latest
    needs: [prepare, release]
    # `release` is skipped when the tag already exists; still publish as long as
    # the version is missing from the registry and release didn't FAIL.
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.needs_npm_publish == 'true' &&
      needs.release.result != 'failure' &&
      needs.release.result != 'cancelled'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to npm (trusted publishing)
        run: npm publish
