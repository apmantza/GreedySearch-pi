name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-lockfile:
    name: Lint & lockfile sync
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Check lockfile sync
        run: npm run check:lockfile

      # Fail on known-vulnerable PRODUCTION deps (what ships to users).
      # Scoped to high/critical to avoid blocking on fix-less moderate
      # advisories; transitive moderate ones are handled by Dependabot.
      # DevDeps are excluded — they never reach users.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Lint (.mjs syntax check)
        run: npm run lint

  install-test:
    name: Install test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint-and-lockfile]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      - name: Pack tarball
        run: npm pack

      - name: Verify required files in tarball
        shell: bash
        run: |
          TARBALL=$(ls *.tgz)
          echo "Checking tarball: $TARBALL"
          TMPDIR=$(mktemp -d)
          tar -xzf "$TARBALL" -C "$TMPDIR"

          # Verify all package.json files/pi entries exist in tarball
          # (catches typos in pi.extensions / files whitelist that would
          # cause "module not found" at runtime).
          export GS_PKG_DIR="$TMPDIR/package"
          node -e "
            const path = require('path');
            const fs = require('fs');
            const pkgDir = process.env.GS_PKG_DIR;
            const pkg = require(path.join(pkgDir, 'package.json'));
            const pi = pkg.pi || {};
            const entries = []
              .concat(pi.extensions || [])
              .concat(pkg.files || []);
            for (const entry of entries) {
              const full = path.join(pkgDir, entry);
              if (entry.endsWith('/')) {
                if (!fs.existsSync(full) || !fs.readdirSync(full).length) {
                  console.error('ERROR: missing/empty tarball dir: ' + entry);
                  process.exit(1);
                }
                console.log('OK: dir -> ' + entry);
              } else {
                if (!fs.existsSync(full)) {
                  console.error('ERROR: entry missing from tarball: ' + entry);
                  process.exit(1);
                }
                console.log('OK: file -> ' + entry);
              }
            }
          "
          rm -rf "$TMPDIR"

      - name: Install from tarball (simulates pi install npm:...)
        shell: bash
        run: |
          TARBALL=$(ls *.tgz)
          npm install -g "$TARBALL"

      - name: Install dependencies (for test imports)
        run: npm install --no-audit --no-fund

      - name: Run unit tests
        run: node test.mjs unit

      - name: Verify extension loads via jiti (catches missing deps)
        shell: bash
        run: |
          # The scoped package installs to <global>/node_modules under the scope
          INSTALL_DIR="$(npm root -g)/@apmantza/greedysearch-pi"
          # Simulate how pi loads extensions: jiti import index.ts
          # ERR_MODULE_NOT_FOUND = missing dep → fail
          # pi-coding-agent is host-provided; absence is expected here
          cd "$INSTALL_DIR"
          npx -y jiti ./index.ts 2>&1 | tee /tmp/jiti-output.txt || true
          if grep -q "ERR_MODULE_NOT_FOUND" /tmp/jiti-output.txt \
             && ! grep -q "pi-coding-agent" /tmp/jiti-output.txt; then
            echo "FAILED: missing module dependency detected"
            cat /tmp/jiti-output.txt
            exit 1
          fi
          echo "Extension import check passed"
