<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>

    <!-- Magnifying glass gradient -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>

    <!-- Perplexity beam -->
    <linearGradient id="pplx" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c8b4"/>
      <stop offset="100%" style="stop-color:#00c8b4;stop-opacity:0"/>
    </linearGradient>

    <!-- Bing beam -->
    <linearGradient id="bing" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00a4ef"/>
      <stop offset="100%" style="stop-color:#00a4ef;stop-opacity:0"/>
    </linearGradient>

    <!-- Google beam -->
    <linearGradient id="google" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbc04"/>
      <stop offset="100%" style="stop-color:#fbbc04;stop-opacity:0"/>
    </linearGradient>

    <!-- Title gradient -->
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>

    <!-- Gemini gradient -->
    <linearGradient id="gemini" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Dot pattern -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#30363d" opacity="0.4"/>
    </pattern>

    <!-- Pi logo shape -->
    <g id="pi-logo">
      <path fill="url(#gemini)" fill-rule="evenodd" d="M0 0H15V10H10V15H5V20H0ZM5 5V10H10V5Z"/>
      <rect x="15" y="10" width="5" height="10" fill="url(#gemini)"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <!-- Decorative arcs -->
  <path d="M 0 300 Q 100 100 200 300 Q 100 500 0 300" fill="#58a6ff" opacity="0.04"/>
  <circle cx="1050" cy="100" r="300" fill="#bc8cff" opacity="0.03"/>
  <circle cx="1100" cy="500" r="200" fill="#3fb950" opacity="0.03"/>

  <!-- ===== MAGNIFYING GLASS ICON ===== -->
  <g transform="translate(175, 300)">
    <!-- Search beams (three engines fanning out) -->
    <line x1="-15" y1="-15" x2="-120" y2="-95" stroke="url(#pplx)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-15" y1="-15" x2="-140" y2="-50" stroke="url(#bing)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-15" y1="-15" x2="-130" y2="-5" stroke="url(#google)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Glass lens -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#glass)" stroke-width="3.5" opacity="0.9"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.15"/>
    <ellipse cx="-18" cy="-22" rx="18" ry="12" fill="#58a6ff" opacity="0.12" transform="rotate(-30 -18 -22)"/>

    <!-- Handle -->
    <line x1="40" y1="40" x2="90" y2="90" stroke="url(#glass)" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <line x1="42" y1="42" x2="88" y2="88" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- ===== TITLE ===== -->
  <text x="390" y="275" font-family="'Segoe UI', -apple-system, system-ui, sans-serif" font-size="82" font-weight="700" letter-spacing="-1.5" fill="url(#title)" filter="url(#glow)">
    GreedySearch
  </text>

  <!-- Pi logo icon -->
  <g transform="translate(905, 218)" opacity="0.85">
    <!-- Outer circle -->
    <circle cx="15" cy="15" r="22" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <!-- Pi P shape -->
    <g transform="translate(-3, 1) scale(1.5)">
      <path fill="#8b5cf6" fill-rule="evenodd" d="M0 0H15V10H10V15H5V20H0ZM5 5V10H10V5Z"/>
      <rect x="15" y="10" width="5" height="10" fill="#8b5cf6"/>
    </g>
  </g>

  <!-- ===== TAGLINE ===== -->
  <text x="390" y="340" font-family="'Segoe UI', -apple-system, system-ui, sans-serif" font-size="22" font-weight="400" fill="#8b949e" letter-spacing="0.3">
    Multi-engine AI search via browser automation.
  </text>

  <!-- Feature pills -->
  <g transform="translate(390, 370)">
    <!-- Pill: No API keys -->
    <rect x="0" y="0" width="160" height="30" rx="15" fill="#1f6feb" opacity="0.15"/>
    <rect x="0" y="0" width="160" height="30" rx="15" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.3"/>
    <text x="80" y="20" font-family="'Segoe UI', -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#58a6ff" text-anchor="middle">🔑 No API keys</text>

    <!-- Pill: Headless -->
    <rect x="175" y="0" width="155" height="30" rx="15" fill="#3fb950" opacity="0.1"/>
    <rect x="175" y="0" width="155" height="30" rx="15" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.3"/>
    <text x="252" y="20" font-family="'Segoe UI', -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#3fb950" text-anchor="middle">👻 Headless Chrome</text>

    <!-- Pill: 3 engines -->
    <rect x="345" y="0" width="220" height="30" rx="15" fill="#bc8cff" opacity="0.1"/>
    <rect x="345" y="0" width="220" height="30" rx="15" fill="none" stroke="#bc8cff" stroke-width="1" opacity="0.3"/>
    <text x="455" y="20" font-family="'Segoe UI', -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#bc8cff" text-anchor="middle">🚀 Perplexity + Bing + Google</text>

    <!-- Pill: Gemini Synthesis -->
    <rect x="580" y="0" width="190" height="30" rx="15" fill="#8b5cf6" opacity="0.1"/>
    <rect x="580" y="0" width="190" height="30" rx="15" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
    <text x="675" y="20" font-family="'Segoe UI', -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#a78bfa" text-anchor="middle">🧠 Gemini Synthesizer</text>
  </g>

  <!-- ===== ENGINE ICONS (bottom row) ===== -->
  <g transform="translate(0, 440)">
    <!-- Divider line -->
    <line x1="80" y1="0" x2="1120" y2="0" stroke="#30363d" stroke-width="1"/>

    <!-- Perplexity -->
    <g transform="translate(220, 45)">
      <circle cx="0" cy="0" r="18" fill="#00c8b4" opacity="0.15"/>
      <text x="0" y="6" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#00c8b4" text-anchor="middle">P</text>
      <text x="35" y="6" font-family="'Segoe UI', -apple-system, sans-serif" font-size="14" font-weight="400" fill="#8b949e">Perplexity</text>
    </g>

    <!-- Bing -->
    <g transform="translate(450, 45)">
      <circle cx="0" cy="0" r="18" fill="#00a4ef" opacity="0.15"/>
      <text x="0" y="6" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#00a4ef" text-anchor="middle">B</text>
      <text x="35" y="6" font-family="'Segoe UI', -apple-system, sans-serif" font-size="14" font-weight="400" fill="#8b949e">Bing Copilot</text>
    </g>

    <!-- Google -->
    <g transform="translate(680, 45)">
      <circle cx="0" cy="0" r="18" fill="#fbbc04" opacity="0.15"/>
      <text x="0" y="6" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#fbbc04" text-anchor="middle">G</text>
      <text x="35" y="6" font-family="'Segoe UI', -apple-system, sans-serif" font-size="14" font-weight="400" fill="#8b949e">Google AI</text>
    </g>

    <!-- Gemini Synthesizer -->
    <g transform="translate(920, 45)">
      <circle cx="0" cy="0" r="18" fill="url(#gemini)" opacity="0.15"/>
      <text x="0" y="6" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#a78bfa" text-anchor="middle">✨</text>
      <text x="35" y="6" font-family="'Segoe UI', -apple-system, sans-serif" font-size="14" font-weight="400" fill="#8b949e">Gemini Synthesis</text>
    </g>
  </g>
</svg>